# ============================================================
#  PRESENCE NODE — Shared Base Configuration
#  Hardware: Seeed XIAO ESP32-S3 Sense + HLK-LD2410C + AM312 PIR
# ============================================================
#  HOW THIS FILE WORKS:
#  This file is the "template" that all room nodes share.
#  You never flash this file directly. Instead, you flash one of:
#    presence-office.yaml
#    presence-livingroom.yaml
#    presence-bedroom.yaml
#  Those files set the room-specific variables and then load this file.
#
#  WHAT THIS NODE DOES:
#  - The LD2410C radar detects if anyone is in the room (even sitting still)
#  - The AM312 PIR detects quick motion (someone walking in)
#  - Both are combined into one "Occupied" sensor in Home Assistant
#  - All data is sent to HA via WiFi automatically
# ============================================================

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly}
  comment: "Presence node — XIAO ESP32-S3 + LD2410C + AM312"

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: arduino

# ============================================================
# LOGGING
# Shows messages in the console when flashing/debugging
# ============================================================
logger:
  level: ${log_level}

# ============================================================
# HOME ASSISTANT API
# This is how HA discovers and controls the device
# ============================================================
api:
  encryption:
    key: !secret ha_api_key

# ============================================================
# OTA (Over-The-Air updates)
# After first flash, you can push updates over WiFi — no USB needed
# ============================================================
ota:
  - platform: esphome
    password: !secret ha_ota_password

# ============================================================
# WIFI
# ============================================================
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback Access Point — if the board can't connect to WiFi,
  # it creates its own hotspot so you can fix the settings.
  ap:
    ssid: "${node_name}-fallback"
    password: !secret wifi_fallback_password

# Shows a webpage at the board's IP address with sensor values
captive_portal:
web_server:
  port: 80

# ============================================================
# MQTT
# Sends sensor data to your HA MQTT broker so n8n and Grafana
# can also read the data (not just HA)
# ============================================================
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: "homelab/presence/${room_name}"
  birth_message:
    topic: "homelab/presence/${room_name}/status"
    payload: "online"
    retain: true
  will_message:
    topic: "homelab/presence/${room_name}/status"
    payload: "offline"
    retain: true
  log_topic: null

# ============================================================
# UART — Serial connection to the LD2410C radar
#
# The LD2410C talks to the ESP32 over a serial (UART) connection.
# Think of it like old-school RS-232 — two wires TX and RX.
#
# WIRING:
#   LD2410C TX  →  XIAO D7 (GPIO44)  ← radar SENDS data here
#   LD2410C RX  →  XIAO D6 (GPIO43)  ← radar RECEIVES commands here
#   LD2410C VCC →  XIAO 3.3V
#   LD2410C GND →  XIAO GND
# ============================================================
uart:
  id: ld2410_uart
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

# ============================================================
# LD2410C RADAR COMPONENT
# ============================================================
ld2410:
  id: ld2410_sensor
  uart_id: ld2410_uart

# ============================================================
# BINARY SENSORS — True/False values (on or off)
# ============================================================
binary_sensor:

  # ---- LD2410C: Is there a target at all? (moving OR still) ----
  - platform: ld2410
    ld2410_id: ld2410_sensor
    has_target:
      name: "${node_friendly} Presence"
      id: room_occupied
      device_class: occupancy
      on_press:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/occupied"
              payload: "true"
              retain: true
      on_release:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/occupied"
              payload: "false"
              retain: true

  # ---- LD2410C: Is there something MOVING? ----
  - platform: ld2410
    ld2410_id: ld2410_sensor
    has_moving_target:
      name: "${node_friendly} Motion"
      id: room_motion
      device_class: motion

  # ---- LD2410C: Is there something STILL? (person sitting/sleeping) ----
  - platform: ld2410
    ld2410_id: ld2410_sensor
    has_still_target:
      name: "${node_friendly} Still Presence"
      id: room_still
      device_class: occupancy

  # ---- AM312 PIR: Fast motion trigger ----
  # WIRING:
  #   AM312 OUT → XIAO D1 (GPIO2)
  #   AM312 VCC → XIAO 3.3V
  #   AM312 GND → XIAO GND
  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT
    name: "${node_friendly} PIR"
    id: pir_sensor
    device_class: motion
    filters:
      - delayed_off: ${pir_delay_off}

  # ---- COMBINED: Room is occupied if EITHER radar OR PIR says so ----
  # This is the main sensor you'll use in HA automations
  - platform: template
    name: "${node_friendly} Occupied (Combined)"
    id: combined_presence
    device_class: occupancy
    lambda: |-
      return id(room_occupied).state || id(pir_sensor).state;

# ============================================================
# SENSORS — Numeric values
# ============================================================
sensor:

  # How far away is the moving target? (in centimeters)
  - platform: ld2410
    ld2410_id: ld2410_sensor
    moving_distance:
      name: "${node_friendly} Moving Distance"
      unit_of_measurement: "cm"
      update_interval: ${update_interval}

  # How far away is the still target?
  - platform: ld2410
    ld2410_id: ld2410_sensor
    still_distance:
      name: "${node_friendly} Still Distance"
      unit_of_measurement: "cm"
      update_interval: ${update_interval}

  # Signal strength of the moving target (0-100)
  - platform: ld2410
    ld2410_id: ld2410_sensor
    moving_energy:
      name: "${node_friendly} Moving Energy"
      update_interval: ${update_interval}

  # Signal strength of the still target (0-100)
  - platform: ld2410
    ld2410_id: ld2410_sensor
    still_energy:
      name: "${node_friendly} Still Energy"
      update_interval: ${update_interval}

  # WiFi signal strength
  - platform: wifi_signal
    name: "${node_friendly} WiFi Signal"
    update_interval: 60s

  # How long the board has been running
  - platform: uptime
    name: "${node_friendly} Uptime"
    update_interval: 60s

# ============================================================
# STATUS LED — The tiny RGB light on the XIAO board
# Green blink = occupied, off = empty
# ============================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "${node_friendly} LED"
    pin: GPIO21
    num_leds: 1
    rmt_symbols: 64
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s

# ============================================================
# BUTTONS — Appear in HA as controls
# ============================================================
button:
  - platform: restart
    name: "${node_friendly} Restart"
  - platform: safe_mode
    name: "${node_friendly} Safe Mode"

# ============================================================
# TEXT SENSORS — Show text info in HA
# ============================================================
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${node_friendly} IP Address"
    ssid:
      name: "${node_friendly} SSID"
    mac_address:
      name: "${node_friendly} MAC Address"
  - platform: version
    name: "${node_friendly} ESPHome Version"

# ============================================================
# NUMBERS — Sliders in HA to tune the radar at runtime
# (No need to reflash to change sensitivity!)
# ============================================================
number:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    timeout:
      name: "${node_friendly} Radar Timeout"
    max_move_distance_gate:
      name: "${node_friendly} Max Move Distance"
    max_still_distance_gate:
      name: "${node_friendly} Max Still Distance"

# ============================================================
# SELECT — Dropdowns in HA
# ============================================================
select:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    distance_resolution:
      name: "${node_friendly} Distance Resolution"

# ============================================================
# SWITCHES — Toggles in HA
# ============================================================
switch:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    engineering_mode:
      name: "${node_friendly} Engineering Mode"
    bluetooth:
      name: "${node_friendly} Radar Bluetooth"
