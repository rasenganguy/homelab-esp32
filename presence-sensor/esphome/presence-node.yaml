# ============================================================
# Homelab Presence Sensor Node
# Hardware: Seeed XIAO ESP32-S3 Sense + HLK-LD2410C + AM312 PIR
# ============================================================
# Per-node customization: change substitutions below only.
# All other YAML is shared across every room node.
# ============================================================

substitutions:
  node_name: "presence-office"          # Change per room: presence-livingroom, presence-bedroom, etc.
  node_friendly: "Office Presence"      # Human-readable name shown in HA
  room_name: "office"                   # Lowercase, no spaces — used in MQTT topics
  ld2410_max_distance: "6m"            # Detection range: 2m/4m/6m (default 6m)
  ld2410_still_threshold: "20"         # Still target energy threshold (0-100, lower = more sensitive)
  ld2410_move_threshold: "20"          # Moving target energy threshold (0-100)
  pir_delay_off: "10s"                 # How long PIR stays "true" after last motion
  update_interval: "5s"                # Sensor reporting interval
  log_level: "INFO"                    # DEBUG / INFO / WARN

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly}
  comment: "Room presence node — ESP32-S3 + LD2410C mmWave + AM312 PIR"

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: arduino

# ============================================================
# CORE SERVICES
# ============================================================
logger:
  level: ${log_level}

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ha_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  domain: ".iot.local"
  # Force onto IoT VLAN 5 by connecting to IoT SSID
  # UniFi SSID for VLAN 5 should be separate from trusted SSID

  ap:
    ssid: "${node_name}-fallback"
    password: !secret wifi_fallback_password

captive_portal:

web_server:
  port: 80

# ============================================================
# MQTT — publishes to HA MQTT broker for n8n/Grafana consumers
# ============================================================
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: "homelab/presence/${room_name}"
  birth_message:
    topic: "homelab/presence/${room_name}/status"
    payload: "online"
  will_message:
    topic: "homelab/presence/${room_name}/status"
    payload: "offline"
  log_topic: null  # Suppress MQTT log spam

# ============================================================
# UART — LD2410C communication
# ============================================================
uart:
  id: ld2410_uart
  tx_pin: GPIO43   # XIAO D6
  rx_pin: GPIO44   # XIAO D7
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

# ============================================================
# LD2410C mmWave RADAR
# ============================================================
ld2410:
  id: ld2410_sensor
  uart_id: ld2410_uart

# ============================================================
# BINARY SENSORS
# ============================================================
binary_sensor:
  # LD2410C — Has any target (moving OR still)
  - platform: ld2410
    ld2410_id: ld2410_sensor
    has_target:
      name: "${node_friendly} Presence"
      id: room_occupied
      device_class: occupancy
      on_press:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/occupied"
              payload: "true"
              retain: true
      on_release:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/occupied"
              payload: "false"
              retain: true

  # LD2410C — Moving target detected
  - platform: ld2410
    ld2410_id: ld2410_sensor
    has_moving_target:
      name: "${node_friendly} Motion"
      id: room_motion
      device_class: motion

  # LD2410C — Still target detected (person sitting/sleeping)
  - platform: ld2410
    ld2410_id: ld2410_sensor
    has_still_target:
      name: "${node_friendly} Still Presence"
      id: room_still
      device_class: occupancy

  # AM312 PIR — Fast motion trigger
  - platform: gpio
    pin:
      number: GPIO2   # XIAO D1
      mode: INPUT
    name: "${node_friendly} PIR"
    id: pir_sensor
    device_class: motion
    filters:
      - delayed_off: ${pir_delay_off}

  # Combined virtual sensor — OR of LD2410 + PIR
  - platform: template
    name: "${node_friendly} Occupied (Combined)"
    id: combined_presence
    device_class: occupancy
    lambda: |-
      return id(room_occupied).state || id(pir_sensor).state;
    on_press:
      then:
        - light.turn_on: status_led
    on_release:
      then:
        - light.turn_off: status_led

# ============================================================
# SENSORS
# ============================================================
sensor:
  # LD2410C — Detection distances
  - platform: ld2410
    ld2410_id: ld2410_sensor
    moving_distance:
      name: "${node_friendly} Moving Distance"
      unit_of_measurement: "cm"
      update_interval: ${update_interval}
    still_distance:
      name: "${node_friendly} Still Distance"
      unit_of_measurement: "cm"
      update_interval: ${update_interval}
    moving_energy:
      name: "${node_friendly} Moving Energy"
      update_interval: ${update_interval}
    still_energy:
      name: "${node_friendly} Still Energy"
      update_interval: ${update_interval}
    detection_distance:
      name: "${node_friendly} Detection Distance"
      unit_of_measurement: "cm"
      update_interval: ${update_interval}

  # WiFi signal strength
  - platform: wifi_signal
    name: "${node_friendly} WiFi Signal"
    update_interval: 60s

  # Uptime
  - platform: uptime
    name: "${node_friendly} Uptime"
    update_interval: 60s

# ============================================================
# STATUS LED (onboard NeoPixel on XIAO S3)
# ============================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "${node_friendly} LED"
    pin: GPIO21
    num_leds: 1
    rmt_symbols: 64
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Pulse"
          transition_length: 1s
          update_interval: 2s

# ============================================================
# BUTTONS
# ============================================================
button:
  - platform: restart
    name: "${node_friendly} Restart"
  - platform: safe_mode
    name: "${node_friendly} Safe Mode"
  - platform: factory_reset
    name: "${node_friendly} Factory Reset"

# ============================================================
# TEXT SENSOR
# ============================================================
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${node_friendly} IP Address"
    ssid:
      name: "${node_friendly} SSID"
    mac_address:
      name: "${node_friendly} MAC"

  - platform: version
    name: "${node_friendly} ESPHome Version"

# ============================================================
# NUMBER — LD2410C runtime tuning via HA
# ============================================================
number:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    timeout:
      name: "${node_friendly} Radar Timeout"
    max_move_distance_gate:
      name: "${node_friendly} Max Move Distance"
    max_still_distance_gate:
      name: "${node_friendly} Max Still Distance"

# ============================================================
# SELECT — LD2410C mode
# ============================================================
select:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    distance_resolution:
      name: "${node_friendly} Distance Resolution"

# ============================================================
# SWITCH
# ============================================================
switch:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    engineering_mode:
      name: "${node_friendly} Engineering Mode"
    bluetooth:
      name: "${node_friendly} Radar Bluetooth"
