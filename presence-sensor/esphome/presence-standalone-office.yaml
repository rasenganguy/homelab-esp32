# ============================================================
#  STANDALONE Presence Node — Zero Home Assistant Required
# ============================================================
#  Flash command (Windows): tools\windows\flash-windows.bat presence-standalone-office
#  Flash command (Linux):   ./tools/linux/flash.sh presence-standalone-office
#
#  DIFFERENCE FROM presence-office.yaml:
#  - NO ESPHome native API (HA can't auto-discover it — intentional)
#  - MQTT is the ONLY communication method
#  - Built-in web server shows all sensor values at http://<board-ip>/
#  - Works with Node-RED, Grafana, n8n directly via MQTT
#  - Still supports OTA updates (password-protected, via direct IP)
#
#  TO ACCESS SENSOR DATA WITHOUT HA:
#  1. Web UI:    http://<board-ip>/        (live values in browser)
#  2. MQTT:      homelab/presence/office/# (all topics)
#  3. Grafana:   CT109 — import the dashboard JSON
#  4. Node-RED:  CT159 — subscribe to MQTT topics
#
#  TO FIND THE BOARD'S IP:
#  - Check your AdGuard/router DHCP leases for hostname "presence-standalone-office"
#  - Or check your UniFi client list for the new device
# ============================================================

substitutions:
  node_name: "presence-standalone-office"
  node_friendly: "Office Presence (Standalone)"
  room_name: "office"
  ld2410_max_distance: "4m"
  ld2410_still_threshold: "20"
  ld2410_move_threshold: "20"
  pir_delay_off: "15s"
  update_interval: "5s"
  log_level: "INFO"

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly}
  comment: "Standalone presence node — MQTT only, no HA required"

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: ${log_level}

# ============================================================
# NO HOME ASSISTANT API — intentionally removed
# The node is fully standalone via MQTT
# ============================================================
# api:             ← intentionally absent
#   encryption:

# ============================================================
# OTA — Still works! Uses password + direct IP, not HA
# esphome run presence-standalone-office.yaml
# ============================================================
ota:
  - platform: esphome
    password: !secret ha_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Give it a static IP so you always know where it is
  # Uncomment and adjust if you want a fixed IP:
  # manual_ip:
  #   static_ip: 192.168.5.50
  #   gateway: 192.168.5.1
  #   subnet: 255.255.255.0
  #   dns1: 192.168.10.227   # Your AdGuard

  ap:
    ssid: "${node_name}-fallback"
    password: !secret wifi_fallback_password

captive_portal:

# ============================================================
# WEB SERVER — Full sensor UI at http://<board-ip>/
# No app, no HA, no nothing — just open a browser
# ============================================================
web_server:
  port: 80
  # Set to true to require a password for the web UI
  auth:
    username: admin
    password: !secret ha_ota_password

# ============================================================
# MQTT — The primary data channel
# All data goes here. Node-RED, Grafana, n8n all subscribe to this.
# ============================================================
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: "homelab/presence/${room_name}"

  # Online/offline notification — useful for monitoring in Uptime Kuma / n8n
  birth_message:
    topic: "homelab/presence/${room_name}/status"
    payload: "online"
    retain: true
  will_message:
    topic: "homelab/presence/${room_name}/status"
    payload: "offline"
    retain: true

  # Disable MQTT logging spam
  log_topic: null

  # Respond to commands from MQTT (allows n8n to control the LED etc.)
  on_message:
    - topic: "homelab/presence/${room_name}/cmd/led"
      then:
        - if:
            condition:
              lambda: 'return x == "on";'
            then:
              - light.turn_on: status_led
            else:
              - light.turn_off: status_led

    - topic: "homelab/presence/${room_name}/cmd/restart"
      then:
        - delay: 1s
        - lambda: 'App.safe_reboot();'

# ============================================================
# UART — LD2410C serial connection
# ============================================================
uart:
  id: ld2410_uart
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  id: ld2410_sensor
  uart_id: ld2410_uart

# ============================================================
# BINARY SENSORS
# ============================================================
binary_sensor:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    has_target:
      name: "${node_friendly} Presence"
      id: room_occupied
      device_class: occupancy
      on_press:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/occupied"
              payload: "true"
              retain: true
          - light.turn_on:
              id: status_led
              red: 0%
              green: 100%
              blue: 0%
      on_release:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/occupied"
              payload: "false"
              retain: true
          - light.turn_off: status_led

  - platform: ld2410
    ld2410_id: ld2410_sensor
    has_moving_target:
      name: "${node_friendly} Motion"
      id: room_motion
      device_class: motion
      on_press:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/motion"
              payload: "true"
      on_release:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/motion"
              payload: "false"

  - platform: ld2410
    ld2410_id: ld2410_sensor
    has_still_target:
      name: "${node_friendly} Still Presence"
      id: room_still
      device_class: occupancy
      on_press:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/still"
              payload: "true"
      on_release:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/still"
              payload: "false"

  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT
    name: "${node_friendly} PIR"
    id: pir_sensor
    device_class: motion
    filters:
      - delayed_off: ${pir_delay_off}
    on_press:
      then:
        - mqtt.publish:
            topic: "homelab/presence/${room_name}/pir"
            payload: "true"
    on_release:
      then:
        - mqtt.publish:
            topic: "homelab/presence/${room_name}/pir"
            payload: "false"

  # Combined presence — OR of radar + PIR
  - platform: template
    name: "${node_friendly} Occupied (Combined)"
    id: combined_presence
    device_class: occupancy
    lambda: |-
      return id(room_occupied).state || id(pir_sensor).state;

# ============================================================
# SENSORS — Numeric values
# ============================================================
sensor:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    moving_distance:
      name: "${node_friendly} Moving Distance"
      unit_of_measurement: "cm"
      update_interval: ${update_interval}
      on_value:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/moving_distance_cm"
              payload: !lambda "return to_string((int)x);"

    still_distance:
      name: "${node_friendly} Still Distance"
      unit_of_measurement: "cm"
      update_interval: ${update_interval}
      on_value:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/still_distance_cm"
              payload: !lambda "return to_string((int)x);"

    moving_energy:
      name: "${node_friendly} Moving Energy"
      update_interval: ${update_interval}

    still_energy:
      name: "${node_friendly} Still Energy"
      update_interval: ${update_interval}

    detection_distance:
      name: "${node_friendly} Detection Distance"
      unit_of_measurement: "cm"
      update_interval: ${update_interval}

  - platform: wifi_signal
    name: "${node_friendly} WiFi Signal"
    update_interval: 60s
    on_value:
      then:
        - mqtt.publish:
            topic: "homelab/presence/${room_name}/wifi_rssi"
            payload: !lambda "return to_string((int)x);"

  - platform: uptime
    name: "${node_friendly} Uptime"
    update_interval: 60s

# ============================================================
# STATUS LED — Onboard NeoPixel
# Green = occupied, Off = empty, Blue blink = boot/connecting
# ============================================================
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "${node_friendly} LED"
    pin: GPIO21
    num_leds: 1
    rmt_symbols: 64
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Connecting"
          transition_length: 500ms
          update_interval: 1s

# Boot animation — blink blue while connecting
esphome:
  name: ${node_name}
  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: status_led
          red: 0%
          green: 0%
          blue: 100%
          effect: "Connecting"
      - wait_until:
          condition:
            wifi.connected:
          timeout: 30s
      - light.turn_off: status_led

# ============================================================
# TEXT SENSOR — Publish IP and MAC to MQTT for discovery
# ============================================================
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${node_friendly} IP"
      on_value:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/ip"
              payload: !lambda "return x;"
              retain: true
    ssid:
      name: "${node_friendly} SSID"
    mac_address:
      name: "${node_friendly} MAC"

  - platform: version
    name: "${node_friendly} ESPHome Version"

# ============================================================
# BUTTONS — Accessible from web UI at http://<board-ip>/
# ============================================================
button:
  - platform: restart
    name: "${node_friendly} Restart"
  - platform: safe_mode
    name: "${node_friendly} Safe Mode"
  - platform: factory_reset
    name: "${node_friendly} Factory Reset"

# ============================================================
# LD2410C TUNING — Accessible from web UI and MQTT
# ============================================================
number:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    timeout:
      name: "${node_friendly} Radar Timeout"
    max_move_distance_gate:
      name: "${node_friendly} Max Move Distance"
    max_still_distance_gate:
      name: "${node_friendly} Max Still Distance"

select:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    distance_resolution:
      name: "${node_friendly} Distance Resolution"

switch:
  - platform: ld2410
    ld2410_id: ld2410_sensor
    engineering_mode:
      name: "${node_friendly} Engineering Mode"
    bluetooth:
      name: "${node_friendly} Radar Bluetooth"
