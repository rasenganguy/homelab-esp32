# ============================================================
# Living Room Presence Node — Instance Config
# ============================================================
# Flash command: esphome run presence-livingroom.yaml
# ============================================================

substitutions:
  node_name: "presence-livingroom"
  node_friendly: "Living Room Presence"
  room_name: "livingroom"
  ld2410_max_distance: "6m"     # Large room, use full range
  ld2410_still_threshold: "15"  # More sensitive for open space
  ld2410_move_threshold: "15"
  pir_delay_off: "10s"
  update_interval: "5s"
  log_level: "INFO"

packages:
  base: !include presence-node.yaml
