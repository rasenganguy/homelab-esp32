# ============================================================
#  Seeed 24GHz mmWave Human Static Presence Sensor
#  SKU: 101010001 (the sensor from your Seeed invoice)
# ============================================================
#  Flash command (Windows): tools\windows\flash-windows.bat seeed-mmwave-kitchen
#  Flash command (Linux):   ./tools/linux/flash.sh seeed-mmwave-kitchen
#
#  ABOUT THIS SENSOR:
#  The Seeed MR24HPC1 is the 24GHz radar from your invoice.
#  It's different from the LD2410C — it uses Seeed's own protocol
#  but ESPHome has full native support for it.
#
#  EXTRA FEATURES vs LD2410C:
#  - Scene modes: Standard, Area detection, Bathroom
#  - Configurable sensitivity (1-3 levels)
#  - Configurable disappear timeout (10s to 60min)
#  - Experimental respiratory detection
#
#  WIRING (same as LD2410C):
#    MR24HPC1 VCC → XIAO 3.3V
#    MR24HPC1 GND → XIAO GND
#    MR24HPC1 TX  → XIAO D7 (GPIO44)
#    MR24HPC1 RX  → XIAO D6 (GPIO43)
# ============================================================

substitutions:
  node_name: "seeed-mmwave-kitchen"
  node_friendly: "Kitchen mmWave"
  room_name: "kitchen"

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly}
  comment: "Seeed 24GHz MR24HPC1 static presence sensor"

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ha_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${node_name}-fallback"
    password: !secret wifi_fallback_password

captive_portal:
web_server:
  port: 80

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: "homelab/presence/${room_name}"
  birth_message:
    topic: "homelab/presence/${room_name}/status"
    payload: "online"
    retain: true
  will_message:
    topic: "homelab/presence/${room_name}/status"
    payload: "offline"
    retain: true
  log_topic: null

# ============================================================
# UART for Seeed MR24HPC1
# ============================================================
uart:
  id: uart_bus
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 115200

# ============================================================
# SEEED MR24HPC1 COMPONENT
# ============================================================
seeed_mr24hpc1:
  id: mr24hpc1
  uart_id: uart_bus

binary_sensor:
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    has_target:
      name: "${node_friendly} Presence"
      device_class: occupancy
      on_press:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/occupied"
              payload: "true"
              retain: true
      on_release:
        then:
          - mqtt.publish:
              topic: "homelab/presence/${room_name}/occupied"
              payload: "false"
              retain: true

  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    has_moving_target:
      name: "${node_friendly} Motion"
      device_class: motion

  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    has_still_target:
      name: "${node_friendly} Still Presence"
      device_class: occupancy

sensor:
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    custom_presence_of_detection:
      name: "${node_friendly} Presence Energy"
    movement_signs:
      name: "${node_friendly} Movement Energy"
    custom_motion_distance:
      name: "${node_friendly} Motion Distance"
      unit_of_measurement: "cm"
    custom_spatial_static_distance:
      name: "${node_friendly} Static Distance"
      unit_of_measurement: "cm"

  - platform: wifi_signal
    name: "${node_friendly} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${node_friendly} Uptime"

number:
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    custom_presence_of_detection:
      name: "${node_friendly} Presence Threshold"
    motion_detection_boundary:
      name: "${node_friendly} Motion Boundary"
    static_detection_boundary:
      name: "${node_friendly} Static Boundary"

select:
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    scene_mode:
      name: "${node_friendly} Scene Mode"
      # Options: standard, area detection, toilet
    sensitivity:
      name: "${node_friendly} Sensitivity"
      # Options: 1=low, 2=medium, 3=high
    time_for_disappear:
      name: "${node_friendly} Timeout"
      # Options: 10s, 30s, 1min, 2min, 5min, 10min, 30min, 60min

switch:
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    output_info_switch:
      name: "${node_friendly} Debug Output"

button:
  - platform: restart
    name: "${node_friendly} Restart"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${node_friendly} IP Address"

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "${node_friendly} LED"
    pin: GPIO21
    num_leds: 1
    rmt_symbols: 64
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s
