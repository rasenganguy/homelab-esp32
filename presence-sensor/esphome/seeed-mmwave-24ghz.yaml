# ============================================================
# Seeed Studio 24GHz mmWave Human Static Presence Sensor
# SKU: 101010001 (from invoice)
# ============================================================
# This is the standalone Seeed mmWave sensor (not the LD2410C).
# It communicates over UART using Seeed's MR24HPC1 protocol.
# Can be used standalone or alongside S3 Sense.
# ============================================================

substitutions:
  node_name: "seeed-mmwave-kitchen"
  node_friendly: "Kitchen mmWave"
  room_name: "kitchen"

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly}
  comment: "Seeed 24GHz mmWave Static Presence Sensor"

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ha_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${node_name}-fallback"
    password: !secret wifi_fallback_password

captive_portal:

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: "homelab/presence/${room_name}"

# ============================================================
# UART for Seeed MR24HPC1 24GHz mmWave sensor
# ============================================================
uart:
  id: uart_bus
  tx_pin: GPIO43
  rx_pin: GPIO44
  baud_rate: 115200

# ============================================================
# Seeed MR24HPC1 component
# ============================================================
seeed_mr24hpc1:
  id: mr24hpc1
  uart_id: uart_bus

binary_sensor:
  # Human presence detected (static or moving)
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    has_target:
      name: "${node_friendly} Presence"
      id: room_occupied
      device_class: occupancy

  # Moving target detected
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    has_moving_target:
      name: "${node_friendly} Motion"
      device_class: motion

  # Static (still) target detected
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    has_still_target:
      name: "${node_friendly} Still Presence"
      device_class: occupancy

sensor:
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    custom_presence_of_detection:
      name: "${node_friendly} Presence Energy"
    movement_signs:
      name: "${node_friendly} Movement Energy"
    custom_motion_distance:
      name: "${node_friendly} Motion Distance"
      unit_of_measurement: "cm"
    custom_spatial_static_distance:
      name: "${node_friendly} Static Distance"
      unit_of_measurement: "cm"
    custom_boundary:
      name: "${node_friendly} Detection Boundary"
    custom_clutter_energy:
      name: "${node_friendly} Clutter Energy"
    custom_max_distance_boundary:
      name: "${node_friendly} Max Boundary"

  - platform: wifi_signal
    name: "${node_friendly} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${node_friendly} Uptime"

number:
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    custom_presence_of_detection:
      name: "${node_friendly} Presence Threshold"
    motion_detection_boundary:
      name: "${node_friendly} Motion Boundary"
    static_detection_boundary:
      name: "${node_friendly} Static Boundary"

text_sensor:
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    heart_rate_abnormality_info:
      name: "${node_friendly} Heart Rate Info"

button:
  - platform: restart
    name: "${node_friendly} Restart"

select:
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    scene_mode:
      name: "${node_friendly} Scene Mode"
      # Options: standard, area detection, toilet
    sensitivity:
      name: "${node_friendly} Sensitivity"
      # Options: 1 (low) through 3 (high)
    time_for_disappear:
      name: "${node_friendly} Timeout"
      # Options: 10s, 30s, 1min, 2min, 5min, 10min, 30min, 60min

switch:
  - platform: seeed_mr24hpc1
    seeed_mr24hpc1_id: mr24hpc1
    output_info_switch:
      name: "${node_friendly} Debug Output"
