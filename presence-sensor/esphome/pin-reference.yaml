# Common substitutions and packages used across all XIAO ESP32 nodes
# Include this in node configs via the !include directive or copy relevant sections

# ============================================================
# BOARD DEFINITIONS
# ============================================================
# XIAO ESP32-S3 Sense
# board: seeed_xiao_esp32s3
# framework: arduino or esp-idf

# XIAO ESP32-C6
# board: seeed_xiao_esp32c6
# framework: esp-idf (required for C6)

# ============================================================
# STANDARD PIN MAPPING — XIAO ESP32-S3 Sense
# ============================================================
# D0  = GPIO1   (A0 / ADC)
# D1  = GPIO2   (A1 / ADC)
# D2  = GPIO3   (A2 / ADC)
# D3  = GPIO4   (A3 / ADC / SDA)
# D4  = GPIO5   (SDA)
# D5  = GPIO6   (SCL)
# D6  = GPIO43  (UART TX)
# D7  = GPIO44  (UART RX)
# D8  = GPIO7   (SCK)
# D9  = GPIO8   (MISO)
# D10 = GPIO9   (MOSI)
# 3V3 = 3.3V power rail
# 5V  = 5V power (from USB)
# GND = Ground

# LD2410C WIRING:
#   LD2410C VCC  → XIAO 3V3
#   LD2410C GND  → XIAO GND
#   LD2410C TX   → XIAO D7 (GPIO44 / UART RX)
#   LD2410C RX   → XIAO D6 (GPIO43 / UART TX)
#   LD2410C OUT  → XIAO D0 (GPIO1) [optional direct GPIO output]

# AM312 PIR WIRING:
#   AM312 VCC    → XIAO 3V3
#   AM312 GND    → XIAO GND
#   AM312 OUT    → XIAO D1 (GPIO2)

# 24GHz mmWave (from Seeed invoice) WIRING:
#   VCC          → XIAO 3V3
#   GND          → XIAO GND
#   TX           → XIAO D7 (GPIO44)
#   RX           → XIAO D6 (GPIO43)

# ============================================================
# XIAO ESP32-C6 PIN MAPPING
# ============================================================
# D0  = GPIO2
# D1  = GPIO3
# D2  = GPIO4
# D3  = GPIO5
# D4  = GPIO6  (SDA)
# D5  = GPIO7  (SCL)
# D6  = GPIO16 (UART TX)
# D7  = GPIO17 (UART RX)
# D8  = GPIO19 (SCK)
# D9  = GPIO20 (MISO)
# D10 = GPIO18 (MOSI)
