# ============================================================
#  Bedroom Presence Node
# ============================================================
#  Flash command (Windows): tools\windows\flash-windows.bat presence-bedroom
#  Flash command (Linux):   ./tools/linux/flash.sh presence-bedroom
#
#  NOTE: This node is tuned for bedroom use:
#  - Lower still threshold to detect sleeping person (micro-breathing motion)
#  - Longer PIR delay so walking to bathroom doesn't clear "occupied"
# ============================================================

substitutions:
  node_name: "presence-bedroom"
  node_friendly: "Bedroom Presence"
  room_name: "bedroom"
  ld2410_max_distance: "4m"
  ld2410_still_threshold: "10"      # Very sensitive — detects sleeping
  ld2410_move_threshold: "15"
  pir_delay_off: "20s"              # Longer: don't clear if you go to bathroom
  update_interval: "5s"
  log_level: "INFO"

packages:
  base: !include presence-node.yaml
