name: Validate ESPHome Configs

on:
  push:
    branches: [ main, develop ]
    paths: ['**/*.yaml', '**/*.yml', '**/*.json']
  pull_request:
    branches: [ main ]

jobs:
  validate-esphome:
    name: Validate ESPHome YAML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Create dummy secrets.yaml
        run: |
          cat > secrets.yaml << 'EOF'
          wifi_ssid: "ci_ssid"
          wifi_password: "ci_password"
          wifi_fallback_password: "ci_fallback"
          ha_api_key: "dGVzdGtleWZvcmNpdGVzdGluZ29ubHkxMjM0NTY3"
          ha_ota_password: "ci_ota"
          mqtt_broker: "192.168.50.127"
          mqtt_username: "ci_user"
          mqtt_password: "ci_pass"
          influxdb_host: "192.168.10.83"
          influxdb_port: "8086"
          influxdb_db: "esp32_sensors"
          influxdb_username: "esp32"
          influxdb_password: "ci_pass"
          EOF

      - name: Validate presence sensor nodes
        run: |
          for config in presence-sensor/esphome/presence-*.yaml; do
            echo "→ $config"
            esphome config "$config"
          done

      - name: Validate Seeed mmWave node
        run: esphome config presence-sensor/esphome/seeed-mmwave-24ghz.yaml

      - name: Validate air quality monitor
        run: esphome config air-quality-monitor/esphome/air-quality-node.yaml

      - name: Validate thermal sensor
        run: esphome config thermal-presence/esphome/thermal-sensor.yaml

      - name: Validate ESP32-C6 node
        run: esphome config esp32-c6-gateway/esphome/c6-env-monitor.yaml

      - name: Validate n8n workflow JSON
        run: |
          for f in n8n-workflows/*.json; do
            python3 -c "import json; json.load(open('$f')); print('✓ $f')"
          done

  security-check:
    name: Check for Hardcoded Secrets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check secrets.yaml is gitignored
        run: |
          if grep -q "^secrets.yaml" .gitignore; then
            echo "✓ secrets.yaml is gitignored"
          else
            echo "ERROR: secrets.yaml must be in .gitignore!"
            exit 1
          fi

      - name: Check for hardcoded passwords
        run: |
          if grep -r "password:" --include="*.yaml" . \
            | grep -v "!secret" | grep -v "#" \
            | grep -v "YOUR_" | grep -v "ci_" \
            | grep -v "secrets.yaml"; then
            echo "WARNING: Possible hardcoded password found"
            exit 1
          fi
          echo "✓ No hardcoded passwords"
