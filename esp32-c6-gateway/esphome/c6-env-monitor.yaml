# ============================================================
# XIAO ESP32-C6 — WiFi Environmental Monitor + Gateway Node
# ============================================================
# The ESP32-C6 is NOT recommended for CSI presence sensing
# (only 512KB SRAM, insufficient for CSI buffers).
#
# BEST USE CASE for C6 in your homelab:
#   - Environmental sensor node (BME280/SHT31 via I2C)
#   - WiFi 6 (802.11ax) network probe/reporter
#   - Lightweight MQTT sensor with ultra-low power deep sleep
#   - Future: Thread/Matter border router (requires separate firmware)
#
# Wiring:
#   BME280 SDA → GPIO6 (D4)
#   BME280 SCL → GPIO7 (D5)
#   BME280 VCC → 3V3
#   BME280 GND → GND
# ============================================================

substitutions:
  node_name: "c6-env-monitor"
  node_friendly: "C6 Environment Monitor"
  room_name: "hallway"
  update_interval: "30s"
  deep_sleep_duration: "25s"   # Sleep between readings to save power

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly}
  comment: "XIAO ESP32-C6 environmental monitor — WiFi 6"

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf
    version: recommended

logger:
  level: INFO
  baud_rate: 0  # Disable USB logging in production to save power

api:
  encryption:
    key: !secret ha_api_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ha_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true           # Skip SSID scan for faster connect
  power_save_mode: HIGH        # WiFi 6 TWT power save
  ap:
    ssid: "${node_name}-fallback"
    password: !secret wifi_fallback_password

captive_portal:

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: "homelab/environment/${room_name}"
  discovery: false

# ============================================================
# I2C Bus
# ============================================================
i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true
  id: i2c_bus

# ============================================================
# BME280 — Temperature, Humidity, Pressure
# ============================================================
sensor:
  - platform: bme280_i2c
    i2c_id: i2c_bus
    address: 0x76
    temperature:
      name: "${node_friendly} Temperature"
      oversampling: 16x
      filters:
        - offset: -1.5  # Compensate for self-heating from MCU
    humidity:
      name: "${node_friendly} Humidity"
      oversampling: 16x
    pressure:
      name: "${node_friendly} Pressure"
      oversampling: 16x
    update_interval: ${update_interval}

  # WiFi Signal
  - platform: wifi_signal
    name: "${node_friendly} WiFi Signal"
    update_interval: 60s

  # Battery voltage (if running on LiPo — A0/GPIO2)
  - platform: adc
    pin: GPIO2
    name: "${node_friendly} Battery Voltage"
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2.0  # Voltage divider 1:1

  - platform: uptime
    name: "${node_friendly} Uptime"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${node_friendly} IP"
    ssid:
      name: "${node_friendly} SSID"

button:
  - platform: restart
    name: "${node_friendly} Restart"

# ============================================================
# Optional: Deep Sleep for battery-powered deployments
# Uncomment to enable. Node will wake, report, and sleep.
# ============================================================
# deep_sleep:
#   id: deep_sleep_control
#   run_duration: 10s
#   sleep_duration: ${deep_sleep_duration}
#   wakeup_pin: GPIO9  # Optional: wake on GPIO trigger
