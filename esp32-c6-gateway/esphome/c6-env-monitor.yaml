# ============================================================
#  XIAO ESP32-C6 — Environmental Monitor
# ============================================================
#  Flash command (Windows): tools\windows\flash-windows.bat c6-env-monitor
#  Flash command (Linux):   ./tools/linux/flash.sh c6-env-monitor
#
#  WHY USE THE C6 FOR THIS AND NOT THE S3?
#  The C6 only has 512KB RAM — not enough for complex sensor fusion.
#  But for a simple BME280 temperature/humidity/pressure sensor it's perfect.
#  The C6 also has WiFi 6 (802.11ax) which uses less power.
#
#  IMPORTANT: The C6 REQUIRES esp-idf framework (NOT arduino).
#  This is already set below. If you change it to arduino it won't compile.
#
#  WIRING:
#    BME280 SDA → XIAO C6 D4 (GPIO6)
#    BME280 SCL → XIAO C6 D5 (GPIO7)
#    BME280 VCC → XIAO C6 3.3V
#    BME280 GND → XIAO C6 GND
#
#  NOTE: The C6 pin numbers are different from the S3!
#  Always check the silk-screen labels on the board (D0, D1, etc.)
# ============================================================

substitutions:
  node_name: "c6-env-monitor"
  node_friendly: "C6 Env Monitor"
  room_name: "hallway"
  update_interval: "30s"

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly}
  comment: "XIAO ESP32-C6 with BME280 — WiFi 6 environmental monitor"

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf        # ← REQUIRED for C6. Do not change to arduino.
    version: recommended

logger:
  level: INFO
  baud_rate: 0           # Disables USB serial logging (saves power in production)

api:
  encryption:
    key: !secret ha_api_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ha_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true     # Skip WiFi scan, connect directly — faster boot
  power_save_mode: HIGH  # WiFi 6 Target Wake Time power saving
  ap:
    ssid: "${node_name}-fallback"
    password: !secret wifi_fallback_password

captive_portal:

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: "homelab/environment/${room_name}"
  log_topic: null

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true
  id: i2c_bus

sensor:
  # ============================================================
  # BME280 — Temperature, Humidity, Barometric Pressure
  # ============================================================
  - platform: bme280_i2c
    i2c_id: i2c_bus
    address: 0x76
    temperature:
      name: "${node_friendly} Temperature"
      oversampling: 16x
      filters:
        - offset: -1.5   # The C6 chip generates heat — compensate
    humidity:
      name: "${node_friendly} Humidity"
      oversampling: 16x
    pressure:
      name: "${node_friendly} Pressure"
      oversampling: 16x
    update_interval: ${update_interval}

  - platform: wifi_signal
    name: "${node_friendly} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${node_friendly} Uptime"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${node_friendly} IP"
    ssid:
      name: "${node_friendly} SSID"

button:
  - platform: restart
    name: "${node_friendly} Restart"

# ============================================================
# DEEP SLEEP — Optional for battery-powered deployments
# If you power this from a battery (LiPo), uncomment this block.
# The board will: wake up → take reading → publish → go back to sleep.
# Each cycle uses almost zero battery.
# ============================================================
# deep_sleep:
#   id: deep_sleep_control
#   run_duration: 15s      # Stay awake 15s to connect WiFi and publish
#   sleep_duration: 5min   # Sleep 5 minutes between readings
