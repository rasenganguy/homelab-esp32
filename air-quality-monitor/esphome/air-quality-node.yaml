# ============================================================
#  Air Quality Monitor Node
#  Hardware: XIAO ESP32-S3 Sense + SCD40 + SEN55 + ENS160 + BMP280
# ============================================================
#  Flash command (Windows): tools\windows\flash-windows.bat air-quality-main
#  Flash command (Linux):   ./tools/linux/flash.sh air-quality-main
#
#  WHAT EACH SENSOR MEASURES:
#  ┌─────────┬───────────────────────────────────────────────┐
#  │ SCD40   │ CO₂ (400-5000ppm), Temperature, Humidity     │
#  │ SEN55   │ PM1/PM2.5/PM4/PM10 dust, VOC Index, NOx      │
#  │ ENS160  │ Air Quality Index (AQI 1-5), eCO₂, TVOC      │
#  │ BMP280  │ Barometric pressure                           │
#  └─────────┴───────────────────────────────────────────────┘
#
#  ALL SENSORS CONNECT VIA I2C (Qwiic cables — no soldering!)
#
#  WIRING — Daisy chain with Qwiic cables:
#    XIAO D4 (GPIO5/SDA) ──► SCD40 ──► SEN55 ──► ENS160 ──► BMP280
#    XIAO D5 (GPIO6/SCL) ──► (same chain)
#    XIAO 3.3V ──► VCC on all sensors
#    XIAO GND  ──► GND on all sensors
#
#  I2C ADDRESSES (must all be different — they are):
#    SCD40   = 0x62
#    SEN55   = 0x69
#    ENS160  = 0x53
#    BMP280  = 0x76
# ============================================================

substitutions:
  node_name: "air-quality-main"
  node_friendly: "Air Quality Monitor"
  location: "living_room"
  update_interval: "60s"

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly}
  comment: "Multi-sensor air quality — SCD40 + SEN55 + ENS160 + BMP280"
  on_boot:
    priority: -100
    then:
      - delay: 5s  # Wait for sensors to power up before reading

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ha_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${node_name}-fallback"
    password: !secret wifi_fallback_password

captive_portal:
web_server:
  port: 80

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: "homelab/air_quality/${location}"
  log_topic: null

# ============================================================
# I2C BUS — The shared communication line for all sensors
# ============================================================
i2c:
  sda: GPIO5    # XIAO D4
  scl: GPIO6    # XIAO D5
  scan: true    # On boot, lists all found I2C devices in logs (useful for debugging)
  frequency: 100kHz
  id: i2c_bus

sensor:
  # ==========================================================
  # SCD40 — CO₂, Temperature, Humidity
  # The most important sensor for air quality.
  # CO₂ over 1000ppm means you need ventilation.
  # ==========================================================
  - platform: scd4x
    id: scd40_sensor
    i2c_id: i2c_bus
    address: 0x62
    update_interval: ${update_interval}
    automatic_self_calibration: true  # Calibrates itself over time

    co2:
      name: "${node_friendly} CO2"
      id: co2_level
      unit_of_measurement: "ppm"
      accuracy_decimals: 0
      on_value:
        then:
          - if:
              condition:
                sensor.in_range:
                  id: co2_level
                  above: 2000
              then:
                - mqtt.publish:
                    topic: "homelab/air_quality/${location}/alerts/co2"
                    payload: "critical"
              else:
                - if:
                    condition:
                      sensor.in_range:
                        id: co2_level
                        above: 1000
                    then:
                      - mqtt.publish:
                          topic: "homelab/air_quality/${location}/alerts/co2"
                          payload: "warning"
                    else:
                      - mqtt.publish:
                          topic: "homelab/air_quality/${location}/alerts/co2"
                          payload: "normal"

    temperature:
      name: "${node_friendly} Temperature"
      id: temp_scd40
      filters:
        - offset: -2.0   # The sensor runs warm due to the ESP32 next to it

    humidity:
      name: "${node_friendly} Humidity"
      id: humidity_scd40

  # ==========================================================
  # SEN55 — Particulate Matter + VOC + NOx
  # PM2.5 is fine particles that enter your lungs.
  # WHO guideline: PM2.5 should be below 15 µg/m³ annual average.
  # ==========================================================
  - platform: sen5x
    id: sen55_sensor
    i2c_id: i2c_bus
    address: 0x69
    update_interval: ${update_interval}

    pm_1_0:
      name: "${node_friendly} PM1.0"
      unit_of_measurement: "µg/m³"
      accuracy_decimals: 1

    pm_2_5:
      name: "${node_friendly} PM2.5"
      id: pm25_level
      unit_of_measurement: "µg/m³"
      accuracy_decimals: 1
      on_value:
        then:
          - if:
              condition:
                sensor.in_range:
                  id: pm25_level
                  above: 25
              then:
                - mqtt.publish:
                    topic: "homelab/air_quality/${location}/alerts/pm25"
                    payload: "warning"
              else:
                - mqtt.publish:
                    topic: "homelab/air_quality/${location}/alerts/pm25"
                    payload: "normal"

    pm_4_0:
      name: "${node_friendly} PM4.0"
      unit_of_measurement: "µg/m³"
      accuracy_decimals: 1

    pm_10_0:
      name: "${node_friendly} PM10"
      unit_of_measurement: "µg/m³"
      accuracy_decimals: 1

    voc_index:
      name: "${node_friendly} VOC Index"
      unit_of_measurement: "index"

    nox_index:
      name: "${node_friendly} NOx Index"
      unit_of_measurement: "index"

    temperature:
      name: "${node_friendly} Temperature (SEN55)"
      filters:
        - offset: -2.0

    humidity:
      name: "${node_friendly} Humidity (SEN55)"

  # ==========================================================
  # ENS160 — Air Quality Index (AQI), eCO₂, TVOC
  # AQI: 1=Excellent, 2=Good, 3=Moderate, 4=Poor, 5=Unhealthy
  # ==========================================================
  - platform: ens160_i2c
    i2c_id: i2c_bus
    address: 0x53
    update_interval: ${update_interval}
    compensation:
      temperature_source: temp_scd40
      humidity_source: humidity_scd40

    eco2:
      name: "${node_friendly} eCO2 (ENS160)"
      unit_of_measurement: "ppm"
      accuracy_decimals: 0

    tvoc:
      name: "${node_friendly} TVOC"
      unit_of_measurement: "ppb"
      accuracy_decimals: 0

    aqi:
      name: "${node_friendly} AQI"
      id: aqi_level

  # ==========================================================
  # BMP280 — Barometric Pressure
  # ==========================================================
  - platform: bmp280_i2c
    i2c_id: i2c_bus
    address: 0x76
    update_interval: ${update_interval}

    temperature:
      name: "${node_friendly} Temperature (BMP280)"
      filters:
        - offset: -2.0

    pressure:
      name: "${node_friendly} Barometric Pressure"
      unit_of_measurement: "hPa"

  - platform: wifi_signal
    name: "${node_friendly} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${node_friendly} Uptime"
    update_interval: 60s

# ============================================================
# TEXT SENSOR — Overall air quality status string
# ============================================================
text_sensor:
  - platform: template
    name: "${node_friendly} Air Quality Status"
    update_interval: 60s
    lambda: |-
      int aqi = (int) id(aqi_level).state;
      int co2 = (int) id(co2_level).state;
      float pm = id(pm25_level).state;
      if (aqi >= 4 || co2 > 2000 || pm > 35) return {"Poor"};
      if (aqi == 3 || co2 > 1000 || pm > 15) return {"Moderate"};
      return {"Good"};

  - platform: wifi_info
    ip_address:
      name: "${node_friendly} IP Address"

button:
  - platform: restart
    name: "${node_friendly} Restart"

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "${node_friendly} LED"
    pin: GPIO21
    num_leds: 1
    rmt_symbols: 64
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 500ms
