---
# ============================================================
# Ansible Playbook: Deploy ESPHome on a Linux host
# Run from CT101 (192.168.10.228) via Semaphore
# ============================================================
# Usage:
#   ansible-playbook ansible/deploy-esphome.yml -i ansible/inventory.yml
#   ansible-playbook ansible/deploy-esphome.yml -i ansible/inventory.yml --tags ota
# ============================================================

- name: Deploy ESPHome environment
  hosts: esphome_host
  become: true
  gather_facts: true

  vars:
    esphome_dir: /opt/esphome
    esphome_config_dir: /opt/esphome/config
    esphome_version: "2024.6.0"

  tasks:
    - name: Install system dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - git
          - curl
          - esptool
        state: present
        update_cache: true

    - name: Create ESPHome directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ esphome_dir }}"
        - "{{ esphome_config_dir }}"

    - name: Create Python venv
      command: python3 -m venv {{ esphome_dir }}/venv
      args:
        creates: "{{ esphome_dir }}/venv/bin/activate"

    - name: Install ESPHome
      pip:
        name: "esphome=={{ esphome_version }}"
        virtualenv: "{{ esphome_dir }}/venv"
        state: present

    - name: Copy secrets.yaml
      copy:
        src: ../secrets.yaml
        dest: "{{ esphome_config_dir }}/secrets.yaml"
        mode: '0600'
      tags: secrets

    - name: Copy all ESPHome configs
      copy:
        src: "{{ item }}"
        dest: "{{ esphome_config_dir }}/"
        mode: '0644'
      with_fileglob:
        - "../presence-sensor/esphome/*.yaml"
        - "../air-quality-monitor/esphome/*.yaml"
        - "../thermal-presence/esphome/*.yaml"
        - "../esp32-c6-gateway/esphome/*.yaml"
      tags: configs

- name: OTA update all nodes
  hosts: esphome_host
  become: true
  tags: ["ota", "never"]

  vars:
    esphome_dir: /opt/esphome
    node_configs:
      - presence-office
      - presence-livingroom
      - presence-bedroom
      - air-quality-main
      - thermal-sensor-office
      - c6-env-monitor

  tasks:
    - name: OTA update {{ item }}
      command: >
        {{ esphome_dir }}/venv/bin/esphome run
        {{ esphome_dir }}/config/{{ item }}.yaml
        --no-logs
      loop: "{{ node_configs }}"
      ignore_errors: true
      register: ota_results

    - name: Show results
      debug:
        msg: "{{ item.item }}: {{ 'OK' if item.rc == 0 else 'FAILED' }}"
      loop: "{{ ota_results.results }}"
