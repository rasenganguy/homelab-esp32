# ============================================================
#  Thermal Presence Sensor — AMG8833 8x8 Thermal Grid
# ============================================================
#  Flash command (Windows): tools\windows\flash-windows.bat thermal-sensor-office
#  Flash command (Linux):   ./tools/linux/flash.sh thermal-sensor-office
#
#  WHAT IS THE AMG8833?
#  It's a 8x8 pixel thermal "camera" — imagine a grid of 64 tiny
#  thermometers arranged in a square. It detects heat, not light.
#  It can see in pitch darkness, through light fabric, and at 10fps.
#
#  WHAT IT DETECTS:
#  - Any heat source above the threshold temperature
#  - Humans (body surface ~32-36°C through clothes: ~28-34°C)
#  - Pets (cats ~35°C, dogs ~37°C — very similar to humans)
#  - Hot appliances (oven, TV, laptop — stays on after person leaves)
#  - Person count estimate (1 person vs 2+ based on hot pixel area)
#
#  WHY USE THIS ALONGSIDE LD2410C?
#  - LD2410C can be fooled by curtains moving in AC airflow
#  - AMG8833 confirms with heat — no false positives from drafts
#  - Thermal can detect direction (entering or leaving a zone)
#
#  WIRING (Qwiic cable — no soldering):
#    AMG8833 SDA → XIAO D4 (GPIO5)
#    AMG8833 SCL → XIAO D5 (GPIO6)
#    AMG8833 VCC → XIAO 3.3V
#    AMG8833 GND → XIAO GND
#    AMG8833 INT → XIAO D0 (GPIO1) [optional interrupt]
# ============================================================

substitutions:
  node_name: "thermal-sensor-office"
  node_friendly: "Office Thermal"
  room_name: "office"
  # Temperature above which a pixel counts as "human heat"
  # Adjust based on season:
  #   Summer: 30.0, Winter: 26.0, To detect pets too: 25.0
  human_temp_threshold: "28.0"
  update_interval: "2s"

esphome:
  name: ${node_name}
  friendly_name: ${node_friendly}
  comment: "AMG8833 thermal grid — presence + person counting"

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret ha_api_key

ota:
  - platform: esphome
    password: !secret ha_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${node_name}-fallback"
    password: !secret wifi_fallback_password

captive_portal:
web_server:
  port: 80

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: "homelab/thermal/${room_name}"
  log_topic: null

i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true

sensor:
  # ============================================================
  # AMG8833 — Aggregate readings from the 8x8 grid
  # ============================================================
  - platform: amg8833
    id: amg8833_sensor
    update_interval: ${update_interval}

    # Highest temperature in the entire 8x8 frame
    max_temperature:
      name: "${node_friendly} Max Temp"
      id: max_temp
      unit_of_measurement: "°C"
      accuracy_decimals: 1
      on_value:
        then:
          - binary_sensor.template.publish:
              id: heat_presence
              state: !lambda "return x > ${human_temp_threshold};"

    # Lowest temperature in the frame
    min_temperature:
      name: "${node_friendly} Min Temp"
      unit_of_measurement: "°C"

    # Average temperature across all 64 pixels
    average_temperature:
      name: "${node_friendly} Avg Frame Temp"
      unit_of_measurement: "°C"

    # The sensor's own thermistor (ambient room temp)
    thermistor_temperature:
      name: "${node_friendly} Ambient Temp"
      unit_of_measurement: "°C"

    # How many of the 64 pixels are above the human-temp threshold
    # 0 = empty, 1-8 = probably 1 person, 9-16 = probably 2 people
    pixels_above_threshold:
      name: "${node_friendly} Hot Pixels"
      id: hot_pixels
      threshold: ${human_temp_threshold}
      on_value:
        then:
          - mqtt.publish:
              topic: "homelab/thermal/${room_name}/hot_pixels"
              payload: !lambda "return to_string((int)x);"

  - platform: wifi_signal
    name: "${node_friendly} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${node_friendly} Uptime"

binary_sensor:
  # Main presence detection via heat
  - platform: template
    name: "${node_friendly} Heat Presence"
    id: heat_presence
    device_class: occupancy

  # Are there likely 2 or more people?
  - platform: template
    name: "${node_friendly} Multiple People"
    device_class: occupancy
    lambda: |-
      return id(hot_pixels).state > 12;

text_sensor:
  # Human-readable occupancy estimate
  - platform: template
    name: "${node_friendly} Occupancy Count"
    update_interval: ${update_interval}
    lambda: |-
      float pixels = id(hot_pixels).state;
      if (pixels == 0) return {"Empty"};
      if (pixels <= 8) return {"1 Person"};
      if (pixels <= 16) return {"2 People"};
      return {"3+ People"};

  - platform: wifi_info
    ip_address:
      name: "${node_friendly} IP Address"

button:
  - platform: restart
    name: "${node_friendly} Restart"

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "${node_friendly} LED"
    pin: GPIO21
    num_leds: 1
    rmt_symbols: 64
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s
